<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>卒業フォトフレーム</title>
<style>
  body {
    margin:0;
    background:#000;
    color:#fff;
    font-family:sans-serif;
    text-align:center;
  }

  .container {
    position:relative;
    width:100%;
    max-width:520px;
    margin:20px auto;
  }

  video {
    width:100%;
    border-radius:8px;
  }

  .polaroid {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
  }

  .caption {
    position:absolute;
    bottom:5%;
    width:100%;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#333;
  }

  button {
    margin:15px;
    padding:12px 20px;
    font-size:16px;
  }

  #msg {
    font-size:14px;
    padding-bottom:20px;
  }
</style>
</head>
<body>

<h2>📸 卒業フォトフレーム</h2>

<div class="container">
  <video id="video" autoplay playsinline muted></video>

  <!-- ポラロイド枠（透過PNG推奨） -->
 <img class="overlay" src="index2.png" alt="frame">

  <div class="caption">
    🎓 卒業おめでとう！
  </div>
</div>

<button id="startBtn">カメラを起動</button>
<div id="msg"></div>

<script>
const msg = (t) => document.getElementById("msg").textContent = t;

document.getElementById("startBtn").addEventListener("click", async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" },
      audio: false
    });
    document.getElementById("video").srcObject = stream;
    msg("カメラ起動OK");
  } catch (e) {
    msg("カメラ起動失敗：" + e.message);
  }
});
</script>

</body>
</html>
