<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>卒業フォトフレーム</title>

<style>
  body{
    margin:0; background:#000; color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    text-align:center;
  }

  .stage{
    width:min(94vw, 520px);
    margin:12px auto;
  }

  .shot{
    position:relative;
    width:100%;
  }

  .frame{
    width:100%;
    height:auto;
    display:block;
    position:relative;
    z-index:3;
    pointer-events:none;
  }

  .window{
    position:absolute;
    z-index:1;
    overflow:hidden;
    border-radius:18px;
    background:#111;

    left: 9%;
    top: 8%;
    width: 82%;
    height: 60%;
  }

  .window video{
    width:100%;
    height:100%;
    object-fit:cover;
  }

  .ver{
    color:#0f0;
    font-size:12px;
    margin:6px 0;
  }

  .caption{ margin-top:10px; font-size:20px; font-weight:700; }
  .btns{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:12px; }
  button{ padding:12px 16px; font-size:16px; border-radius:10px; border:none; }
  #msg{ white-space:pre-wrap; font-size:13px; opacity:.9; padding:8px 12px 16px; }

  #preview{ width:100%; margin-top:10px; border-radius:12px; display:none; }
  #downloadLink{ display:none; color:#fff; text-decoration:underline; margin-top:8px; }

  @media (orientation: portrait) {
    .stage{
      width: min(92vw, 420px);
      margin: 8px auto;
    }
    .caption{ font-size:18px; margin-top:8px; }
    button{ font-size:15px; padding:10px 14px; }
  }
</style>
</head>

<body>
  <div class="stage">
    <div class="shot" id="shot">
      <div class="window" id="window">
        <video id="video" autoplay playsinline muted></video>
      </div>
      <img class="frame" id="frame" src="index2.png" alt="frame">
    </div>

    <div class="ver">v=TEST-0323</div>
    <div class="caption">🎓 卒業おめでとう！</div>

    <div class="btns">
      <button id="startBtn">カメラ起動（外カメ）</button>
      <button id="switchBtn" disabled>カメラ切替</button>
      <button id="shutterBtn" disabled>📸 シャッター</button>
    </div>

    <img id="preview" alt="preview">
    <a id="downloadLink" download="graduation.png">画像を保存（ダウンロード）</a>

    <div id="msg"></div>
  </div>

<script>
const $ = (id)=>document.getElementById(id);
const msg = (t)=> $("msg").textContent = t;

let currentStream = null;
let currentFacing = "environment"; // 外カメ優先

async function startCamera(facingMode){
  try{
    if (!navigator.mediaDevices?.getUserMedia){
      msg("このブラウザはカメラAPIに対応していません。Safariで開いてください。");
      return;
    }
    if (currentStream){
      currentStream.getTracks().forEach(t=>t.stop());
      currentStream = null;
    }

    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: facingMode } },
      audio: false
    });

    currentStream = stream;
    $("video").srcObject = stream;

    $("switchBtn").disabled = false;
    $("shutterBtn").disabled = false;

    msg(`カメラ起動OK（${facingMode === "environment" ? "外カメ" : "インカメ"}）`);
  }catch(e){
    msg("カメラ起動に失敗：\n" + (e?.name ? e.name + " / " : "") + (e?.message ?? e));
  }
}

$("startBtn").addEventListener("click", ()=> startCamera("environment"));

$("switchBtn").addEventListener("click", async ()=>{
  currentFacing = (currentFacing === "environment") ? "user" : "environment";
  await startCamera(currentFacing);
});

$("shutterBtn").addEventListener("click", ()=>{
  const shot = $("shot");
  const win = $("window");
  const video = $("video");
  const frame = $("frame");

  const sw = shot.clientWidth;
  const sh = shot.clientHeight;

  const canvas = document.createElement("canvas");
  canvas.width  = Math.round(sw * devicePixelRatio);
  canvas.height = Math.round(sh * devicePixelRatio);
  const ctx = canvas.getContext("2d");
  ctx.scale(devicePixelRatio, devicePixelRatio);

  const sRect = shot.getBoundingClientRect();
  const wRect = win.getBoundingClientRect();
  const wx = wRect.left - sRect.left;
  const wy = wRect.top  - sRect.top;
  const ww = wRect.width;
  const wh = wRect.height;

  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, sw, sh);

  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw || !vh){
    msg("動画がまだ準備できていません。少し待ってからシャッターを押してください。");
    return;
  }
  const scale = Math.max(ww / vw, wh / vh);
  const dw = vw * scale;
  const dh = vh * scale;
  const dx = wx + (ww - dw) / 2;
  const dy = wy + (wh - dh) / 2;
  ctx.drawImage(video, dx, dy, dw, dh);

  const iw = frame.naturalWidth, ih = frame.naturalHeight;
  if (!iw || !ih){
    msg("フレーム画像が読み込めていません（index2.png）。");
    return;
  }
  const s2 = Math.min(sw / iw, sh / ih);
  const fw = iw * s2, fh = ih * s2;
  const fx = (sw - fw) / 2, fy = (sh - fh) / 2;
  ctx.drawImage(frame, fx, fy, fw, fh);

  const dataUrl = canvas.toDataURL("image/png");
  $("preview").src = dataUrl;
  $("preview").style.display = "block";
  $("downloadLink").href = dataUrl;
  $("downloadLink").style.display = "inline-block";
  msg("撮影しました。下にプレビューが出ます。『画像を保存』で保存できます。");
});
</script>

</body>
</html>
