<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>卒業フォトフレーム</title>
<style>
  body{ margin:0; background:#000; color:#fff; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; text-align:center; }
  .stage{ width:min(92vw, 520px); margin:14px auto; }

  /* フレーム画像を基準に表示：横幅だけ決めて、縦は画像に任せる */
  .polaroid{
    position:relative;
    width:100%;
  }
  .polaroid img.frame{
    width:100%;
    height:auto;
    display:block;
  }

  /* 窓：フレーム画像の上に重ねる（%で微調整） */
  .window{
    position:absolute;
    left: var(--win-left, 9%);
    top:  var(--win-top, 10%);
    width:var(--win-width, 82%);
    height:var(--win-height, 68%);
    overflow:hidden;
    border-radius: 6px;
    background:#111;
    z-index:1;
  }
  .window video{
    width:100%;
    height:100%;
    object-fit:cover;
    transform: scaleX(-1);
  }

  .caption{ margin-top:10px; font-size:20px; font-weight:700; }
  button{ margin:12px 0 6px; padding:12px 18px; font-size:16px; }
  #msg{ white-space:pre-wrap; font-size:13px; opacity:.9; padding:0 12px 16px; }
</style>
</head>
<body>
  <div class="stage">
    <div class="polaroid"
      style="
        --win-left: 9%;
        --win-top: 10%;
        --win-width: 82%;
        --win-height: 68%;
      ">
      <div class="window">
        <video id="video" autoplay playsinline muted></video>
      </div>
      <!-- フレーム画像（これが“基準”） -->
      <img class="frame" src="index2.png" alt="frame">
    </div>

    <div class="caption">🎓 卒業おめでとう！</div>
    <button id="startBtn">カメラを起動</button>
    <div id="msg"></div>
  </div>

<script>
const msg = (t) => document.getElementById("msg").textContent = t;
document.getElementById("startBtn").addEventListener("click", async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" },
      audio: false
    });
    document.getElementById("video").srcObject = stream;
    msg("カメラ起動OK");
  } catch (e) {
    msg("カメラ起動に失敗：\n" + (e?.name ? e.name + " / " : "") + (e?.message ?? e));
  }
});
</script>
</body>
</html>
