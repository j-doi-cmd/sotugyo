<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>卒業フォトフレーム</title>
<style>
  body{
    margin:0; background:#000; color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    text-align:center;
  }

  /* iPhone画面に収める */
  .stage{
    width:min(94vw, 520px);
    margin:12px auto;
  }

  /* ここが“撮影画面” */
  .shot{
    position:relative;
    width:100%;
    aspect-ratio: 3 / 4;          /* 必要なら後で変更 */
    background:#111;
    overflow:hidden;
    border-radius:12px;
  }

  /* カメラ映像は下：全体に敷く */
  video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;              /* 画面いっぱい */
    z-index:1;
  }

  /* フレーム画像は上：欠けないよう contain */
  .frame{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;            /* フレームを欠けさせない */
    z-index:3;
    pointer-events:none;
  }

  /* 文字（必要なら） */
  .caption{
    margin-top:10px;
    font-size:20px;
    font-weight:700;
  }

  .btns{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:12px;
  }

  button{
    padding:12px 16px;
    font-size:16px;
    border-radius:10px;
    border:none;
  }

  #msg{
    white-space:pre-wrap;
    font-size:13px;
    opacity:.9;
    padding:8px 12px 16px;
  }

  /* 撮った写真プレビュー */
  #preview{
    width:100%;
    margin-top:10px;
    border-radius:12px;
    display:none;
  }

  a#downloadLink{
    display:none;
    color:#fff;
    text-decoration:underline;
    margin-top:8px;
    display:inline-block;
  }
</style>
</head>

<body>
  <div class="stage">
    <div class="shot">
      <video id="video" autoplay playsinline muted></video>
      <!-- フレームはGitHubに置いた index2.png -->
      <img class="frame" src="index2.png" alt="frame">
    </div>

    <div class="caption">🎓 卒業おめでとう！</div>

    <div class="btns">
      <button id="startBtn">カメラ起動（外カメ）</button>
      <button id="switchBtn" disabled>カメラ切替</button>
      <button id="shutterBtn" disabled>📸 シャッター</button>
    </div>

    <img id="preview" alt="preview">
    <a id="downloadLink" download="graduation.png">画像を保存（ダウンロード）</a>

    <div id="msg"></div>
  </div>

<script>
const $ = (id)=>document.getElementById(id);
const msg = (t)=> $("msg").textContent = t;

let currentStream = null;
let currentFacing = "environment"; // ←外カメ優先

async function startCamera(facingMode){
  try{
    if (!navigator.mediaDevices?.getUserMedia){
      msg("このブラウザはカメラAPIに対応していません。Safariで開いてください。");
      return;
    }

    // 既存ストリーム停止
    if (currentStream){
      currentStream.getTracks().forEach(t=>t.stop());
      currentStream = null;
    }

    const constraints = {
      video: { facingMode: { ideal: facingMode } },
      audio: false
    };

    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    currentStream = stream;
    $("video").srcObject = stream;

    $("switchBtn").disabled = false;
    $("shutterBtn").disabled = false;

    msg(`カメラ起動OK（${facingMode === "environment" ? "外カメ" : "インカメ"}）`);
  }catch(e){
    msg("カメラ起動に失敗：\n" + (e?.name ? e.name + " / " : "") + (e?.message ?? e));
  }
}

$("startBtn").addEventListener("click", ()=> startCamera("environment"));

$("switchBtn").addEventListener("click", async ()=>{
  currentFacing = (currentFacing === "environment") ? "user" : "environment";
  await startCamera(currentFacing);
});

$("shutterBtn").addEventListener("click", ()=>{
  const video = $("video");
  const shot = document.querySelector(".shot");
  const frame = document.querySelector(".frame");

  // 表示サイズ（CSS上の見え方）で合成する
  const w = shot.clientWidth;
  const h = shot.clientHeight;

  const canvas = document.createElement("canvas");
  canvas.width = Math.round(w * window.devicePixelRatio);
  canvas.height = Math.round(h * window.devicePixelRatio);
  const ctx = canvas.getContext("2d");
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

  // 1) カメラ映像（cover相当で描画）
  // videoの実サイズ
  const vw = video.videoWidth;
  const vh = video.videoHeight;
  if (!vw || !vh){
    msg("動画がまだ準備できていません。少し待ってからシャッターを押してください。");
    return;
  }
  // cover計算
  const scale = Math.max(w / vw, h / vh);
  const dw = vw * scale;
  const dh = vh * scale;
  const dx = (w - dw) / 2;
  const dy = (h - dh) / 2;
  ctx.drawImage(video, dx, dy, dw, dh);

  // 2) フレーム画像（contain相当で描画）
  const iw = frame.naturalWidth;
  const ih = frame.naturalHeight;
  if (!iw || !ih){
    msg("フレーム画像が読み込めていません（index2.png）。");
    return;
  }
  const s2 = Math.min(w / iw, h / ih);
  const fw = iw * s2;
  const fh = ih * s2;
  const fx = (w - fw) / 2;
  const fy = (h - fh) / 2;
  ctx.drawImage(frame, fx, fy, fw, fh);

  // 3) 出力
  const dataUrl = canvas.toDataURL("image/png");

  $("preview").src = dataUrl;
  $("preview").style.display = "block";

  const link = $("downloadLink");
  link.href = dataUrl;
  link.style.display = "inline-block";

  msg("撮影しました。下にプレビューが出ます。『画像を保存』をタップして保存できます。");
});
</script>
</body>
</html>
